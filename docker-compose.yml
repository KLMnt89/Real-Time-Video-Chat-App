version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: always
    container_name: muxvideorooms-db
    environment:
      POSTGRES_DB: muxvideorooms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: