<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mux Video Rooms</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="container">
    <h1>🎥 Mux Video Rooms</h1>

    <!-- Error box -->
    <div id="error-box" class="error-box hidden"></div>

    <!-- Create form -->
    <div class="card">
        <h2>Create Meeting</h2>
        <input id="title-input" type="text" placeholder="Meeting title" />
        <input id="name-input" type="text" placeholder="Your name" />
        <button id="create-btn" class="btn btn-blue">+ Create Meeting</button>
    </div>

    <!-- Meetings list -->
    <h2>Meetings</h2>
    <div id="meetings-list">
        <p>Loading...</p>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
