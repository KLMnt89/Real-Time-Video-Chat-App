spring.application.name=mux-video-rooms
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/muxvideorooms}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LiveKit
livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.public-url=${LIVEKIT_PUBLIC_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:devsecretsuperlong1234567890abcdef}


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.jpa.hibernate.ddl-auto=validate
