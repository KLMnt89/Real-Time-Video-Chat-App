spring.application.name=mux-video-rooms
server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/muxvideorooms}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - let Flyway manage schema, Hibernate just maps
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# LiveKit
livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.public-url=${LIVEKIT_PUBLIC_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:devsecretsuperlong1234567890abcdef}

# JWT
jwt.secret=c2VjcmV0LWp3dC1rZXktZm9yLWh1ZGRsZS1hcHAtMjAyNXh4eHh4eA==
jwt.expiration=86400000

# Actuator - only expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
